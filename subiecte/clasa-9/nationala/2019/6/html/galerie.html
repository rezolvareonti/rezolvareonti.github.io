<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galerie</title>
</head>

<body>

<h2>Galerie de cărți</h2>

<!-- imaginea principală -->
<img src="galerie.png" usemap="#galerieMap" width="600">

<!-- definirea zonelor clicabile -->
<map name="galerieMap">

    <!-- Zona 1 -->
    <area shape="rect"
          coords="0,0,200,400"
          href="adela.png"
          alt="Carte 1">

    <!-- Zona 2 -->
    <area shape="rect"
          coords="200,0,400,400"
          href="Ciocoii_vechis_si_noi.jpg"
          alt="Carte 2">

    <!-- Zona 3 -->
    <area shape="rect"
          coords="400,0,600,400"
          href="Viata_ca_o_prada.jpg"
          alt="Carte 3">

</map>

</body>
</html>
